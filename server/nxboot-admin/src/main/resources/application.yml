spring:
  application:
    name: nxboot
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

nxboot:
  jwt:
    secret: ${NXBOOT_JWT_SECRET:change-me-in-production-must-be-at-least-256-bits}
    expiration: ${NXBOOT_JWT_EXPIRATION:86400000}
    refresh-expiration: ${NXBOOT_JWT_REFRESH_EXPIRATION:604800000}
  file:
    upload-dir: ./uploads
  # OAuth2 社会化登录配置（按需启用）
