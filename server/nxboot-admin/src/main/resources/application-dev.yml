spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/nxboot
    username: ocean
    password:
  jooq:
    sql-dialect: postgres

nxboot:
  jwt:
    secret: nxboot-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174

logging:
  level:
    org.jooq.tools.LoggerListener: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
